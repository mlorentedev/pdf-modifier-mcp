# =============================================================================
# compose.base.yml — shared service definitions (base layer)
# Included by dev and prod variants.
# =============================================================================

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - storage-data:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - pdf-modifier-net

  web:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - pdf-modifier-net

volumes:
  storage-data:
    driver: local

networks:
  pdf-modifier-net:
    driver: bridge
