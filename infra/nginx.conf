# =============================================================================
# nginx.conf — reverse proxy for docs (Astro) + API proxy
# Mounted at /etc/nginx/conf.d/default.conf in frontend container
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream: FastAPI backend
# ---------------------------------------------------------------------------
upstream backend {
    server backend:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Main server
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---------------------------------------------------------------------------
    # Health check (nginx-level, separate from FastAPI /health)
    # ---------------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ---------------------------------------------------------------------------
    # API proxy — /api/* forwards to FastAPI
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for file operations (large PDFs)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer large request bodies (file uploads up to 50MB)
        client_max_body_size 50M;
    }

    # ---------------------------------------------------------------------------
    # MCP endpoint — /mcp (if exposed through nginx)
    # ---------------------------------------------------------------------------
    location /mcp {
        proxy_pass http://backend/mcp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ---------------------------------------------------------------------------
    # Static files — Astro SPA routing
    # /_astro/* are hashed assets — cache aggressively
    # ---------------------------------------------------------------------------
    location /_astro/ {
        alias /usr/share/nginx/html/_astro/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media (public/*) — no cache busting, short cache
    location /public/ {
        alias /usr/share/nginx/html/public/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # SPA fallback — serve index.html for all non-file routes
    # ---------------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache static HTML — no aggressive caching in case of updates
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # ---------------------------------------------------------------------------
    # Deny access to dotfiles and sensitive files
    # ---------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
