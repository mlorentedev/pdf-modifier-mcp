# =============================================================================
# compose.dev.yml — development overrides (hot-reload, bind mounts)
# Usage: docker compose -f infra/compose.base.yml -f infra/compose.dev.yml up
# =============================================================================

services:
  api:
    volumes:
      - ../src:/app/src:delegated
      - ../pyproject.toml:/app/pyproject.toml:ro
      - storage-data:/app/storage
      - .env:/app/.env:ro
    environment:
      - APP_ENV=development
      - DEBUG=true
    command: python -m uvicorn pdf_modifier.web.app:create_app --factory --host 0.0.0.0 --port 8000 --reload
    # Remove depends_on to start api first

  web:
    volumes:
      - ../site:/build:delegated
    working_dir: /build
    command: sh -c "npm ci --no-fund --no-audit && npm run dev -- --host 0.0.0.0"
