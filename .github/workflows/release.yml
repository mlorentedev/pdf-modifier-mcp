name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  id-token: write
  statuses: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Run CI on the release-please PR branch and report status checks.
  # Needed because GITHUB_TOKEN events don't trigger other workflows,
  # so the CI workflow never runs on the release-please branch.
  release-pr-ci:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Check if release branch exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(gh api "repos/${REPO}/git/ref/heads/release-please--branches--master" --jq '.object.sha' 2>/dev/null || echo "")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "exists=$( [ -n "$SHA" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.check.outputs.exists == 'true'
        with:
          ref: release-please--branches--master
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        if: steps.check.outputs.exists == 'true'
        with:
          enable-cache: true

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv
          uv pip install -e ".[dev]"
          make check

      - name: Report status on release PR
        if: always() && steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.check.outputs.sha }}
          PY_VERSION: ${{ matrix.python-version }}
          JOB_STATUS: ${{ job.status }}
        run: |
          STATE="failure"
          if [ "$JOB_STATUS" = "success" ]; then STATE="success"; fi
          gh api "repos/${REPO}/statuses/${SHA}" \
            -f state="$STATE" \
            -f context="test (${PY_VERSION})" \
            -f description="Release PR CI"

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-mcp:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
