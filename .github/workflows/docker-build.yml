name: Docker Build

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "Dockerfile.frontend"
      - "infra/compose*.yml"
      - "infra/nginx.conf"
      - "src/**"
      - "site/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [master]
    paths:
      - "Dockerfile"
      - "Dockerfile.frontend"
      - "infra/compose*.yml"
      - "infra/nginx.conf"

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: mlorentedev/pdf-modifier-api
  IMAGE_FRONTEND: mlorentedev/pdf-modifier-web

jobs:
  # -----------------------------------------------------------------------
  # Backend image
  # -----------------------------------------------------------------------
  build-backend:
    name: Backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Release tag: v1.6.0 → 1.6.0
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # Branch push: use short sha
            echo "version=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify health (PR only)
        if: github.event_name == 'pull_request'
        run: |
          docker run -d --name test-api -p 8000:8000 ${{ env.IMAGE_BACKEND }}:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api && docker rm test-api

  # -----------------------------------------------------------------------
  # Frontend image
  # -----------------------------------------------------------------------
  build-frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify health (PR only)
        if: github.event_name == 'pull_request'
        run: |
          docker run -d --name test-web -p 80:80 ${{ env.IMAGE_FRONTEND }}:latest
          sleep 3
          curl -f http://localhost:80/nginx-health || exit 1
          docker stop test-web && docker rm test-web

  # -----------------------------------------------------------------------
  # Compose smoke test (PR only — no push needed)
  # -----------------------------------------------------------------------
  compose:
    name: Docker Compose up
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Compose up (base)
        run: docker compose -f infra/compose.base.yml up -d --build

      - name: Wait for services
        run: |
          sleep 10
          docker compose -f infra/compose.base.yml ps

      - name: Check health
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:80/nginx-health || exit 1

      - name: Compose down
        if: always()
        run: docker compose -f infra/compose.base.yml down -v
