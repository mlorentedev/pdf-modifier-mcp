name: Docker Build

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile"
      - "Dockerfile.frontend"
      - "infra/compose*.yml"
      - "infra/nginx.conf"
      - "src/**"
      - "site/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [master]
    paths:
      - "Dockerfile"
      - "Dockerfile.frontend"
      - "infra/compose*.yml"
      - "infra/nginx.conf"

jobs:
  build-backend:
    name: Backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: pdf-modifier-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify health
        run: |
          docker run -d --name test-api -p 8000:8000 pdf-modifier-api:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api && docker rm test-api

  build-frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          load: true
          tags: pdf-modifier-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify health
        run: |
          docker run -d --name test-web -p 80:80 pdf-modifier-web:test
          sleep 3
          curl -f http://localhost:80/nginx-health || exit 1
          docker stop test-web && docker rm test-web

  compose:
    name: Docker Compose up
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Compose up (base)
        run: docker compose -f infra/compose.base.yml up -d --build

      - name: Wait for services
        run: |
          sleep 10
          docker compose -f infra/compose.base.yml ps

      - name: Check health
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:80/nginx-health || exit 1

      - name: Compose down
        if: always()
        run: docker compose -f infra/compose.base.yml down -v
