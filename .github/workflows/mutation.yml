name: Mutation Testing

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        working-directory: backend
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install mutmut

      - name: Run mutmut
        working-directory: backend
        run: |
          mutmut run --paths-to-mutate=src --no-coverage --tests-dir tests --include-ignored

      - name: Check mutation score
        working-directory: backend
        run: |
          TOTAL=$(mutmut results 2>/dev/null | grep -c "survived\|eliminated\|timeout\|stopped\|uncertain\|no tests run" || echo 0)
          SURVIVED=$(mutmut results 2>/dev/null | grep -c "survived" || echo 0)
          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$(( (TOTAL - SURVIVED) * 100 / TOTAL ))
          else
            SCORE=100
          fi
          echo "Mutation score: ${SCORE}%"
          if [ "$SCORE" -lt 70 ]; then
            echo "::error::Mutation score ${SCORE}% is below the 70% threshold."
            echo "Reproduce locally: mutmut results --no-of-tests=1"
            exit 1
          fi
