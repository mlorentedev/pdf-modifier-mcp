name: Add to bitácora

# Puts every opened/reopened issue and PR onto the cross-repo bitácora board
# (GitHub Project #1). Pairs with bitacora-status.yml (which flips an assigned
# issue to In Progress). Canonical copy for the OPS-002 (#258) multi-repo rollout.

# Note: actions/add-to-project@v1 only supports issues, not PRs. We use it for
# issues and fall back to gh project item-add for PRs.

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

jobs:
  add-to-project:
    # Fork PRs run without repository secrets — BITACORA_PAT would be empty and the
    # job would fail (Codex review on kubelab#237). Skip them; fork PRs reach the
    # board via the rollout backfill or a manual item-add.
    if: github.event_name == 'issues' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      # Issues: use the official action (works fine for issues)
      - name: Add issue to project
        if: github.event_name == 'issues'
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/mlorentedev/projects/1
          github-token: ${{ secrets.BITACORA_PAT }}

      # PRs: use github-script with GraphQL (gh project CLI fails with
      # 'unknown owner type' under fine-grained PATs — see bitacora-status.yml).
      - name: Add PR to project
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BITACORA_PAT }}
          script: |
            const projectId = 'PVT_kwHOAM7xJs4BZ6GY';
            const contentId = context.payload.pull_request.node_id;

            const added = await github.graphql(
              `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }`,
              { projectId, contentId },
            );

            core.info(`Added PR #${context.payload.pull_request.number} to bitácora (item ${added.addProjectV2ItemById.item.id})`);
