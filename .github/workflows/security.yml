name: Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: Pip audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        working-directory: backend
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pip-audit
        working-directory: backend
        run: |
          uv pip install pip-audit
          uv pip freeze | pip-audit -n 10

  bandit:
    name: Bandit (Python security linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        working-directory: backend
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install bandit[toml]

      - name: Run bandit
        working-directory: backend
        run: |
          bandit -r src -ll --skip B101,B104 -f json -o bandit-report.json
          cat bandit-report.json || echo "No issues found"
